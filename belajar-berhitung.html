<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUF Berhitung - Belajar Matematika</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            line-height: 1.6;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 520px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 {
            color: #fff;
            font-size: 2em;
            font-weight: 900;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; font-size: 0.95em; margin-bottom: 20px; font-weight: 600; }

        /* Buttons base */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #f5576c, #f093fb); color: #fff; }
        .btn-ghost { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.15); }

        /* Mode selector */
        .mode-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
        .mode-btn {
            padding: 10px 16px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7); border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 0.85em; transition: all 0.3s;
        }
        .mode-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
        .mode-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-color: transparent; transform: scale(1.05); }

        /* Difficulty */
        .difficulty-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .diff-btn {
            padding: 6px 14px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7); border-radius: 10px; cursor: pointer; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 0.8em; transition: all 0.3s;
        }
        .diff-btn:hover { border-color: rgba(255,255,255,0.3); }
        .diff-btn.active { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; border-color: transparent; }

        /* Welcome / User select */
        .welcome-card { text-align: center; padding: 10px 0; }
        .welcome-card .emoji { font-size: 4em; margin-bottom: 10px; }
        .welcome-card h2 { color: #fff; font-size: 1.3em; margin-bottom: 6px; }
        .welcome-card p { color: rgba(255,255,255,0.5); font-size: 0.9em; margin-bottom: 20px; }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .user-btn {
            padding: 16px; border: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
            color: #fff; border-radius: 16px; cursor: pointer; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 1.1em; transition: all 0.3s;
        }
        .user-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .user-btn .u-emoji { font-size: 1.5em; display: block; margin-bottom: 4px; }

        /* Score board */
        .score-board { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
        .score-item {
            background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 16px;
            text-align: center; flex: 1; min-width: 70px;
        }
        .score-value { font-size: 1.4em; font-weight: 900; color: #fff; }
        .score-label { font-size: 0.7em; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .level-badge {
            display: inline-block; background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff; padding: 4px 14px; border-radius: 20px; font-weight: 800; font-size: 0.85em; margin-bottom: 10px;
        }
        .question-counter { color: rgba(255,255,255,0.4); font-size: 0.8em; font-weight: 600; text-align: center; margin-bottom: 6px; }

        .greeting { color: #fff; font-weight: 700; font-size: 1em; margin-bottom: 10px; text-align: center; }

        /* Question area */
        .question-area {
            background: rgba(255,255,255,0.06); border-radius: 16px; padding: 24px;
            margin-bottom: 16px; min-height: 150px; display: flex; flex-direction: column;

        }
        .question-text { font-size: 1.3em; color: #fff; font-weight: 700; margin-bottom: 12px; }
        .emoji-display { font-size: 2.8em; margin: 8px 0; letter-spacing: 6px; line-height: 1.3; word-break: break-all; }
        .hint-text { color: rgba(255,255,255,0.4); font-size: 0.85em; font-style: italic; }

        /* Choice buttons */
        .choice-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
        .choice-btn {
            padding: 18px 26px; font-size: 1.5em; font-weight: 900;
            border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
            background: rgba(255,255,255,0.08); color: #fff; cursor: pointer;
            transition: all 0.3s; min-width: 80px; font-family: 'Nunito', sans-serif;
        }
        .choice-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); transform: scale(1.05); }
        .choice-btn:active { transform: scale(0.95); }
        .choice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .choice-btn.correct { background: #11998e !important; border-color: #38ef7d !important; }
        .choice-btn.wrong { background: #f5576c !important; border-color: #f093fb !important; }

        .feedback { font-size: 1.1em; font-weight: 700; margin: 10px 0; min-height: 36px; text-align: center; }
        .feedback.correct { color: #38ef7d; }
        .feedback.incorrect { color: #f5576c; }

        /* Timer bar */
        .timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 8px 0 4px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #38ef7d, #11998e); border-radius: 3px; transition: width 0.3s linear; }
        .timer-bar.warning { background: linear-gradient(90deg, #ffd86f, #f5576c); }
        .timer-bar.danger { background: linear-gradient(90deg, #f5576c, #f093fb); }
        .timer-text { color: rgba(255,255,255,0.5); font-size: 0.75em; font-weight: 600; text-align: right; margin-bottom: 2px; }

        .next-btn {
            display: none; margin: 12px auto 0; padding: 12px 28px; background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
            font-weight: 800; font-size: 1em; cursor: pointer; transition: all 0.3s;
        }
        .next-btn:hover { transform: translateY(-2px); }

        /* Memory game */
        .memory-timer { font-size: 1.3em; color: #fff; font-weight: 800; margin: 10px 0; text-align: center; }
        .memory-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 12px 0; max-width: 280px; margin-left: auto; margin-right: auto; }
        .memory-card {
            aspect-ratio: 1; font-size: 1.8em; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px;
            cursor: pointer; transition: all 0.3s; color: transparent; user-select: none;
        }
        .memory-card.revealed { background: rgba(255,255,255,0.15); color: #fff; }
        .memory-card.matched { background: #11998e; color: #fff; }
        .memory-card:hover { transform: scale(1.05); }

        /* Sound toggle */
        .sound-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 100;
            padding: 10px 14px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
            color: #fff; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85em;
            transition: all 0.3s;
        }
        .sound-toggle:hover { background: rgba(255,255,255,0.2); }

        /* Leaderboard modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 28px; max-width: 420px; width: 100%; max-height: 70vh; overflow-y: auto; animation: fadeIn 0.3s ease-out;
        }
        .modal-content h2 { color: #fff; font-size: 1.3em; margin-bottom: 16px; text-align: center; }
        .lb-row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); font-size: 0.9em; }
        .lb-row:last-child { border: none; }
        .lb-pts { color: #38ef7d; font-weight: 800; }
        .modal-close {
            display: block; margin: 16px auto 0; padding: 10px 24px; background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
            cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; transition: all 0.3s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }

        /* High scores summary */
        .high-scores-summary {
            margin-top: 16px; padding: 14px; background: rgba(255,255,255,0.06);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
        }
        .high-scores-summary h3 { color: #f093fb; font-size: 0.95em; margin-bottom: 8px; text-align: center; }
        .high-score-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85em; color: rgba(255,255,255,0.7); }
        .high-score-mode { color: #667eea; font-weight: 700; }
        .high-score-value { color: #38ef7d; font-weight: 700; }

        /* Leaderboard & progress buttons */
        .float-btns { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
        .float-btn {
            padding: 10px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8); border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 0.85em; transition: all 0.3s;
        }
        .float-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .float-btn.progress { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; border: none; }

        /* Screen management */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Welcome overlay */
        .welcome-overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .welcome-overlay.hidden { display: none; }

        /* Animations */
        @keyframes celebrate { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        .celebrate { animation: celebrate 0.5s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        .shake { animation: shake 0.4s ease; }

        /* Responsive */
        @media(max-width:480px){
            .container { padding: 20px 16px; }
            h1 { font-size: 1.6em; }
            .choice-btn { padding: 14px 20px; font-size: 1.3em; min-width: 65px; }
            .mode-btn { font-size: 0.78em; padding: 8px 12px; }
            .score-item { padding: 8px 10px; }
            .score-value { font-size: 1.1em; }
        }
    </style>
</head>

    <script type="module">
        // ============ FIREBASE IMPORTS ============
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSy...xfcw",
            authDomain: "yusufbelajar-8154a.firebaseapp.com",
            databaseURL: "https://yusufbelajar-8154a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yusufbelajar-8154a",
            storageBucket: "yusufbelajar-8154a.firebasestorage.app",
            messagingSenderId: "910863331954",
            appId: "1:910863331954:web:db9b0b64cf17157644c8eb",
            measurementId: "G-JH44C7H074"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ============ STATE ============
        let currentMode = 'random';
        let currentDifficulty = 'easy';
        let correctAnswer = 0;
        let correctScore = 0;
        let wrongScore = 0;
        let streakScore = 0;
        let soundEnabled = true;
        let currentUser = null;
        let questionNumber = 0;
        let questionsPerLevel = 10;
        let isAnswering = false;
        let currentLevel = 1;
        let isMemoryMode = false;
        let memorySequence = [];
        let memoryPlayerIndex = 0;
        let memoryTimer = null;
        let timerInterval = null;
        let timeLeft = 0;

        const USERS = ['Yusuf','Musa','Aisha','Umum'];
        const EMOJIS = {Yusuf:'👦',Musa:'🧒',Aisha:'👧',Umum:'🌐'};
        const MODES = [
            {key:'add',label:'➕ Tambah'},{key:'subtract',label:'➖ Kurang'},
            {key:'multiply',label:'✖️ Kali'},{key:'divide',label:'➗ Bagi'},
            {key:'memory',label:'🧠 Memori'},{key:'random',label:'🎲 Acak'}
        ];
        const BADGES = [
            {id:'firstPlay',name:'🎮 First Play',desc:'Main pertama kali',check:s=>s.totalSessions>=1},
            {id:'streak3',name:'🔥 On Fire',desc:'Streak 3 hari',check:s=>s.streak>=3},
            {id:'streak7',name:'💪 Unstoppable',desc:'Streak 7 hari',check:s=>s.streak>=7},
            {id:'total100',name:'🌟 Star Student',desc:'100 soal benar',check:s=>s.totalCorrect>=100},
            {id:'total500',name:'🏅 Master',desc:'500 soal benar',check:s=>s.totalCorrect>=500},
            {id:'perfect10',name:'⭐ Perfect 10',desc:'10/10 dalam 1 sesi',check:s=>s.perfectSessions>=1}
        ];

        // ============ AUDIO ============
        let audioCtx = null;
        function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
        function playSound(type){
            if(!soundEnabled)return;
            try{
                const ctx=getAC(),osc=ctx.createOscillator(),gain=ctx.createGain();
                osc.connect(gain);gain.connect(ctx.destination);
                if(type==='correct'){
                    osc.frequency.setValueAtTime(523.25,ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25,ctx.currentTime+0.1);
                    osc.frequency.setValueAtTime(783.99,ctx.currentTime+0.2);
                    gain.gain.setValueAtTime(0.25,ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);
                    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
                }else if(type==='wrong'){
                    osc.frequency.setValueAtTime(392,ctx.currentTime);
                    osc.frequency.setValueAtTime(329.63,ctx.currentTime+0.15);
                    osc.frequency.setValueAtTime(261.63,ctx.currentTime+0.3);
                    gain.gain.setValueAtTime(0.25,ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
                    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
                }else{
                    osc.frequency.setValueAtTime(800,ctx.currentTime);
                    gain.gain.setValueAtTime(0.08,ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.1);
                    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.1);
                }
            }catch(e){}
        }
        function toggleSound(){
            soundEnabled=!soundEnabled;
            document.getElementById('soundToggle').textContent=soundEnabled?'🔊 Suara':'🔇 Sunyi';
        }

        // ============ FIREBASE HELPERS ============
        async function getUserStats(user){
            try{const snap=await get(ref(db,'stats/'+user));return snap.exists()?snap.val():{streak:0,lastPlayDate:null,totalCorrect:0,totalWrong:0,totalSessions:0,perfectSessions:0,badges:[]}}catch(e){return {streak:0,lastPlayDate:null,totalCorrect:0,totalWrong:0,totalSessions:0,perfectSessions:0,badges:[]}}
        }
        async function saveUserStats(user,stats){
            try{await set(ref(db,'stats/'+user),stats)}catch(e){console.log('FB save error:',e)}
        }
        async function recordSession(user,correct,wrong,mode,diff){
            const stats=await getUserStats(user);
            const today=new Date().toISOString().split('T')[0];
            if(stats.lastPlayDate){
                const ld=new Date(stats.lastPlayDate),td=new Date(today);
                const dd=Math.floor((td-ld)/(86400000));
                if(dd===1)stats.streak++;else if(dd>1)stats.streak=1;
            }else stats.streak=1;
            stats.lastPlayDate=today;
            stats.totalCorrect=(stats.totalCorrect||0)+correct;
            stats.totalWrong=(stats.totalWrong||0)+wrong;
            stats.totalSessions=(stats.totalSessions||0)+1;
            if(wrong===0&&correct>0)stats.perfectSessions=(stats.perfectSessions||0)+1;
            const newBadges=[];
            for(const b of BADGES){
                if(!stats.badges||!stats.badges.includes(b.id)){
                    if(b.check(stats)){stats.badges=stats.badges||[];stats.badges.push(b.id);newBadges.push(b);}
                }
            }
            await saveUserStats(user,stats);
            if(newBadges.length>0){
                setTimeout(()=>alert('🏆 Badge baru: '+newBadges.map(b=>b.name+' - '+b.desc).join('\n')),300);
            }
        }
        async function getLeaderboard(){
            try{
                const snap=await get(ref(db,'leaderboard'));
                if(snap.exists())return snap.val();
            }catch(e){}
            try{return JSON.parse(localStorage.getItem('yusuf_leaderboard'))||{}}catch(e){return {}}
        }
        async function saveLeaderboard(lb){
            try{await set(ref(db,'leaderboard'),lb)}catch(e){}
            localStorage.setItem('yusuf_leaderboard',JSON.stringify(lb));
            serverScores=lb;
        }
        let serverScores={};
        function getScoreKey(u,m,d){return u+'|'+m+'|'+d}
        async function updateLeaderboardScore(user,mode,diff,score){
            const lb=await getLeaderboard();
            const key=getScoreKey(user,mode,diff);
            if(!lb[key]||score>lb[key]){lb[key]=score;await saveLeaderboard(lb);}
        }
        async function getHighScore(user,mode,diff){
            const lb=await getLeaderboard();
            return lb[getScoreKey(user,mode,diff)]||0;
        }

        // ============ NAVIGATION ============
        function showScreen(id){
            document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function selectUmum(){
            const customName = prompt('Masukkan nama kamu:', '');
            if (customName && customName.trim()) {
                const name = customName.trim();
                localStorage.setItem('yusuf_custom_name', name);
                selectUser(name, true);
            }
        }
        function selectUser(name, isCustom){
            currentUser=name;
            localStorage.setItem('yusuf_user',name);
            const emoji = EMOJIS[name] || '🌐';
            document.getElementById('welcomeOverlay').classList.add('hidden');
            showScreen('mainMenu');
            document.getElementById('greeting').textContent='Halo, '+emoji+' '+name+'! 👋';
            resetScores();
            playSound('click');
        }
        function backToWelcome(){
            clearTimer();
            document.getElementById('welcomeOverlay').classList.remove('hidden');
            resetScores();
        }
        function backToMenu(){
            clearTimer();
            showScreen('mainMenu');
            const emoji = EMOJIS[currentUser] || '🌐';
            document.getElementById('greeting').textContent='Halo, '+emoji+' '+currentUser+'! 👋';
            resetScores();
        }
        function backToHome(){window.location.href='index.html'}
        function goToEnglish(){window.location.href='belajar-english.html'}
        function resetScores(){
            correctScore=0;wrongScore=0;streakScore=0;questionNumber=0;
            updateScoreDisplay();
        }
        function updateScoreDisplay(){
            ['correctScore','correctScore2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=correctScore});
            ['wrongScore','wrongScore2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=wrongScore});
            ['streakScore','streakScore2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=streakScore});
            ['levelBadge','levelBadge2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='Level '+currentLevel});
            ['questionCounter','questionCounter2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='Soal '+questionNumber+'/'+questionsPerLevel});
        }

        // ============ TIMER ============
        function getTimerDuration(){
            const times = {easy: 20, medium: 15, hard: 10};
            return times[currentDifficulty] || 15;
        }
        function startTimer(){
            clearTimer();
            const total = getTimerDuration();
            timeLeft = total;
            const bar = document.getElementById('timerBar');
            const text = document.getElementById('timerText');
            bar.style.width = '100%';
            bar.className = 'timer-bar';
            text.textContent = '⏱ ' + timeLeft + 's';
            document.getElementById('timerContainer').style.display = 'block';
            timerInterval = setInterval(() => {
                timeLeft--;
                const pct = (timeLeft / total) * 100;
                bar.style.width = Math.max(0, pct) + '%';
                text.textContent = '⏱ ' + timeLeft + 's';
                if (pct < 25) bar.className = 'timer-bar danger';
                else if (pct < 50) bar.className = 'timer-bar warning';
                if (timeLeft <= 0) {
                    clearTimer();
                    timeOut();
                }
            }, 1000);
        }
        function clearTimer(){
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById('timerContainer').style.display = 'none';
        }
        function timeOut(){
            if (isAnswering) return;
            isAnswering = true;
            // Check if still on game screen
            if (!document.getElementById('gameScreen').classList.contains('active')) return;
            document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true });
            const fb = document.getElementById('feedback');
            fb.textContent = '⏰ Waktu habis! Jawaban: ' + correctAnswer;
            fb.className = 'feedback incorrect';
            document.querySelectorAll('.choice-btn').forEach(b => {
                if (parseInt(b.textContent) === correctAnswer) b.classList.add('correct');
            });
            wrongScore++; streakScore = 0;
            updateScoreDisplay();
            playSound('wrong');
            setTimeout(nextQuestion, 1200);
        }

        // ============ MODE & DIFFICULTY ============
        function setMode(mode,ev){
            currentMode=mode;
            document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
            ev.target.classList.add('active');
            document.getElementById('difficultySection').style.display=(mode==='memory'?'none':'flex');
            playSound('click');
            startGame();
        }
        function setDifficulty(diff,ev){
            currentDifficulty=diff;
            document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
            ev.target.classList.add('active');
            const levels={easy:1,medium:2,hard:3};
            currentLevel=levels[diff];
            updateScoreDisplay();
            playSound('click');
        }

        // ============ GAME ============
        function startGame(){
            clearTimer();
            showScreen('gameScreen');
            const modeLabel=MODES.find(m=>m.key===currentMode)?.label||currentMode;
            const diffLabel={easy:'🌟 Mudah',medium:'🌟🌟 Sedang',hard:'🌟🌟🌟 Sulit'}[currentDifficulty]||'';
            const emoji = EMOJIS[currentUser] || '🌐';
            document.getElementById('greeting2').textContent=emoji+' '+currentUser+' | '+modeLabel+(currentMode!=='memory'?' '+diffLabel:'');
            resetScores();
            nextQuestion();
        }

        function getDifficultyRange(){
            const ranges={easy:[1,9],medium:[1,20],hard:[1,50]};
            return ranges[currentDifficulty]||ranges.easy;
        }

        function nextQuestion(){
            if(questionNumber>=questionsPerLevel){finishRound();return;}
            questionNumber++;
            isAnswering=false;
            document.getElementById('feedback').textContent='';
            document.getElementById('feedback').className='feedback';
            document.getElementById('nextBtn').style.display='none';
            document.getElementById('memoryTimer').style.display='none';
            document.getElementById('memoryGrid').style.display='none';
            isMemoryMode=false;
            updateScoreDisplay();

            let mode=currentMode;
            if(mode==='random'){
                const opts=['add','subtract','multiply','divide','memory'];
                mode=opts[Math.floor(Math.random()*opts.length)];
            }

            if(mode==='memory'){startMemoryGame();return;}

            const [min,max]=getDifficultyRange();
            let a,b,op,answer;
            switch(mode){
                case 'add': a=rand(min,max);b=rand(min,max);op='+';answer=a+b;break;
                case 'subtract': a=rand(min,max+5);b=rand(min,a);op='−';answer=a-b;break;
                case 'multiply':
                    if(currentDifficulty==='easy'){a=rand(1,5);b=rand(1,5);}
                    else if(currentDifficulty==='medium'){a=rand(2,9);b=rand(2,9);}
                    else{a=rand(5,12);b=rand(5,12);}
                    op='×';answer=a*b;break;
                case 'divide':
                    if(currentDifficulty==='easy'){b=rand(1,5);answer=rand(1,5);a=b*answer;}
                    else if(currentDifficulty==='medium'){b=rand(2,9);answer=rand(2,9);a=b*answer;}
                    else{b=rand(5,12);answer=rand(5,12);a=b*answer;}
                    op='÷';break;
                default: a=rand(1,9);b=rand(1,9);op='+';answer=a+b;
            }

            correctAnswer=answer;
            const questionText=a+' '+op+' '+b+' = ?';
            document.getElementById('question').textContent=questionText;

            // Emoji visual
            if(currentDifficulty==='easy'&&['add','subtract'].includes(currentMode)){
                const total=['add','random'].includes(currentMode)?answer:a;
                document.getElementById('emojiDisplay').textContent='⭐'.repeat(Math.min(total,30));
                document.getElementById('hintText').textContent='Hitung jumlah bintangnya!';
            }else{
                document.getElementById('emojiDisplay').textContent='';
                document.getElementById('hintText').textContent='Pilih jawaban yang benar!';
            }

            generateChoices(answer);
            document.getElementById('memoryTimer').style.display='none';
            document.getElementById('memoryGrid').style.display='none';
            startTimer();
        }

        function rand(mn,mx){return Math.floor(Math.random()*(mx-mn+1))+mn}

        function generateChoices(correct){
            const choices=[correct];
            const range=Math.max(5,Math.ceil(correct*0.5));
            while(choices.length<4){
                let w=correct+rand(-range,range);
                if(w>=0&&!choices.includes(w))choices.push(w);
            }
            choices.sort(()=>Math.random()-0.5);
            const container=document.getElementById('choiceButtons');
            container.innerHTML='';
            choices.forEach(c=>{
                const btn=document.createElement('button');
                btn.className='choice-btn';
                btn.textContent=c;
                btn.onclick=()=>checkAnswer(c,btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(chosen,btn){
            if(isAnswering)return;
            isAnswering=true;
            clearTimer();
            document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true});
            const area=document.getElementById('questionArea');
            const fb=document.getElementById('feedback');
            if(chosen===correctAnswer){
                btn.classList.add('correct');
                fb.textContent='🎉 Benar! Jawaban: '+correctAnswer;
                fb.className='feedback correct';
                area.classList.add('celebrate');setTimeout(()=>area.classList.remove('celebrate'),400);
                correctScore++;streakScore++;
                playSound('correct');
            }else{
                btn.classList.add('wrong');
                document.querySelectorAll('.choice-btn').forEach(b=>{if(parseInt(b.textContent)===correctAnswer)b.classList.add('correct')});
                fb.textContent='😅 Jawaban: '+correctAnswer;
                fb.className='feedback incorrect';
                area.classList.add('shake');setTimeout(()=>area.classList.remove('shake'),400);
                wrongScore++;streakScore=0;
                playSound('wrong');
            }
            updateScoreDisplay();
            setTimeout(nextQuestion, 900);
        }

        // ============ MEMORY GAME ============
        const allMemoryEmojis=['🐶','🐱','🐰','🐼','🐨','🦁','🐯','🐸','🐵','🦊','🐻','🐷','🐮','🐔','🐧','🐦'];
        let memoryRevealed=[];
        let memoryMatched=[];
        let isMemorizing=false;

        function startMemoryGame(){
            isMemoryMode=true;
            isAnswering=false;
            document.getElementById('question').textContent='🧠 Permainan Memori!';
            document.getElementById('emojiDisplay').textContent='';
            document.getElementById('hintText').textContent='Ingat urutan emoji!';
            document.getElementById('choiceButtons').innerHTML='';
            document.getElementById('nextBtn').style.display='none';
            document.getElementById('feedback').textContent='';
            document.getElementById('feedback').className='feedback';

            const seqLen={easy:3,medium:5,hard:7}[currentDifficulty]||3;
            memorySequence=[];
            memoryRevealed=[];
            memoryMatched=[];
            isMemorizing=true;
            for(let i=0;i<seqLen;i++){
                memorySequence.push(allMemoryEmojis[Math.floor(Math.random()*allMemoryEmojis.length)]);
                memoryRevealed.push(false);
                memoryMatched.push(false);
            }
            memoryPlayerIndex=0;

            // Show sequence
            const timerEl=document.getElementById('memoryTimer');
            const gridEl=document.getElementById('memoryGrid');
            timerEl.style.display='block';
            gridEl.style.display='grid';

            let countdown=seqLen+2;
            timerEl.textContent='⏳ '+countdown;
            const ci=setInterval(()=>{
                countdown--;
                timerEl.textContent='⏳ '+countdown;
                if(countdown<=0){
                    clearInterval(ci);
                    isMemorizing=false;
                    timerEl.textContent='🧠 Giliranmu!';
                    renderMemoryGame();
                }else{
                    renderMemoryGame();
                }
            },1000);
        }

        function renderMemoryGame(){
            const grid=document.getElementById('memoryGrid');
            grid.innerHTML='';
            memorySequence.forEach((emoji,i)=>{
                const card=document.createElement('div');
                card.className='memory-card';
                const shouldReveal=isMemorizing||memoryPlayerIndex>i;
                if(shouldReveal)card.classList.add('revealed');
                if(memoryMatched[i])card.classList.add('matched');
                card.textContent=(memoryMatched[i]||shouldReveal)?emoji:'❓';
                card.onclick=()=>memoryClick(i);
                grid.appendChild(card);
            });
        }

        function memoryClick(idx){
            if(isAnswering||memoryMatched[idx]||memoryPlayerIndex!==idx)return;
            const card=document.querySelectorAll('.memory-grid .memory-card')[idx];
            if(!card)return;
            card.textContent=memorySequence[idx];
            card.classList.add('revealed');

            if(memorySequence[idx]===memorySequence[memoryPlayerIndex]){
                memoryMatched[idx]=true;
                memoryPlayerIndex++;
                playSound('click');
                if(memoryPlayerIndex>=memorySequence.length){
                    isAnswering=true;
                    const fb=document.getElementById('feedback');
                    fb.textContent='🎉 Ingatanmu luar biasa!';
                    fb.className='feedback correct';
                    correctScore++;streakScore++;
                    playSound('correct');
                    updateScoreDisplay();
                    setTimeout(nextQuestion, 1200);
                }
            }else{
                isAnswering=true;
                const fb=document.getElementById('feedback');
                fb.textContent='😅 Urutannya: '+memorySequence.join(' ');
                fb.className='feedback incorrect';
                wrongScore++;streakScore=0;
                playSound('wrong');
                updateScoreDisplay();
                // Advance question and show next after delay
                document.getElementById('nextBtn').style.display='block';
            }
        }

        // ============ ROUND END ============
        async function finishRound(){
            clearTimer();
            await recordSession(currentUser,correctScore,wrongScore,currentMode,currentDifficulty);
            await updateLeaderboardScore(currentUser,currentMode,currentDifficulty,correctScore);

            const fb=document.getElementById('feedback');
            document.getElementById('question').textContent='🎉 Ronde Selesai!';
            document.getElementById('emojiDisplay').textContent='';
            document.getElementById('hintText').textContent='';
            document.getElementById('choiceButtons').innerHTML='';
            document.getElementById('nextBtn').style.display='none';
            document.getElementById('memoryTimer').style.display='none';
            document.getElementById('memoryGrid').style.display='none';

            if(correctScore>=7){
                fb.textContent='🎉 Luar Biasa! Skor: '+correctScore+'/'+questionsPerLevel+'!';
                fb.className='feedback correct';
                if(currentLevel<3&&currentMode!=='memory'){
                    currentLevel++;
                    fb.textContent+=' → Naik ke Level '+(currentLevel)+'! 🌟';
                    const diffMap={1:'easy',2:'medium',3:'hard'};
                    currentDifficulty=diffMap[currentLevel];
                    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
                    const diffBtns=document.querySelectorAll('.diff-btn');
                    if(diffBtns[currentLevel-1])diffBtns[currentLevel-1].classList.add('active');
                }else{
                    fb.textContent+=' 🏆';
                }
            }else{
                fb.textContent='Skor: '+correctScore+'/'+questionsPerLevel+'. Coba lagi ya! 💪';
                fb.className='feedback incorrect';
            }
            updateScoreDisplay();

            // Don't auto-restart — go back to menu so user can choose
            setTimeout(()=>{
                clearTimer();
                backToMenu();
            },3000);
        }

        // ============ LEADERBOARD ============
        async function showLeaderboard(){
            const lb=await getLeaderboard();
            let html='';
            let hasData=false;
            for(const user of USERS){
                for(const mode of MODES){
                    for(const diff of ['easy','medium','hard']){
                        const key=getScoreKey(user,mode.key,diff);
                        if(lb[key]){
                            hasData=true;
                            const dl={easy:'🌟',medium:'🌟🌟',hard:'🌟🌟🌟'}[diff];
                            html+='<div class="lb-row"><span>'+EMOJIS[user]+' '+user+' | '+mode.label+' '+dl+'</span><span class="lb-pts">'+lb[key]+' pts</span></div>';
                        }
                    }
                }
            }
            if(!hasData)html='<p style="color:rgba(255,255,255,0.4);text-align:center">Belum ada skor. Ayo bermain! 🎮</p>';
            document.getElementById('lbContent').innerHTML=html;
            document.getElementById('lbModal').classList.add('show');
        }
        function closeLB(){document.getElementById('lbModal').classList.remove('show')}

        // ============ PROGRESS ============
        async function showProgress(){
            const stats=await getUserStats(currentUser);
            const html=`
                <div class="lb-row"><span>👤 User</span><span>${EMOJIS[currentUser]||'🌐'} ${currentUser}</span></div>
                <div class="lb-row"><span>✅ Total Benar</span><span class="lb-pts">${stats.totalCorrect||0}</span></div>
                <div class="lb-row"><span>❌ Total Salah</span><span style="color:#f5576c;font-weight:800">${stats.totalWrong||0}</span></div>
                <div class="lb-row"><span>🎮 Sesi Bermain</span><span>${stats.totalSessions||0}</span></div>
                <div class="lb-row"><span>🔥 Streak Hari</span><span style="color:#FF9800;font-weight:800">${stats.streak||0} hari</span></div>
                <div class="lb-row"><span>⭐ Perfect Sesi</span><span style="color:#ffd86f;font-weight:800">${stats.perfectSessions||0}</span></div>
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1)">
                    <p style="color:rgba(255,255,255,0.6);font-size:0.85em;text-align:center;margin-bottom:8px">🏅 Badges</p>
                    ${(stats.badges&&stats.badges.length>0?stats.badges.map(b=>{
                        const bd=BADGES.find(x=>x.id===b);
                        return '<div class="lb-row"><span>'+bd?.name||b+'</span><span style="color:#ffd86f">✓</span></div>';
                    }).join(''):'<p style="color:rgba(255,255,255,0.3);text-align:center;font-size:0.8em">Belum ada badge. Terus belajar! 💪</p>')}
                </div>
            `;
            document.getElementById('progressContent').innerHTML=html;
            document.getElementById('progressModal').classList.add('show');
        }
        function closeProgress(){document.getElementById('progressModal').classList.remove('show')}

        // ============ INIT ============
        (function(){
            const saved=localStorage.getItem('yusuf_user');
            if(saved&&USERS.includes(saved)){
                selectUser(saved);
            }
        })();

        // Expose functions globally
        window.selectUser=selectUser;
        window.selectUmum=selectUmum;
        window.backToWelcome=backToWelcome;
        window.backToMenu=backToMenu;
        window.backToHome=backToHome;
        window.goToEnglish=goToEnglish;
        window.setMode=setMode;
        window.setDifficulty=setDifficulty;
        window.checkAnswer=checkAnswer;
        window.nextQuestion=nextQuestion;
        window.memoryClick=memoryClick;
        window.showLeaderboard=showLeaderboard;
        window.closeLB=closeLB;
        window.showProgress=showProgress;
        window.closeProgress=closeProgress;
        window.toggleSound=toggleSound;
        window.startGame=startGame;
    </script>
